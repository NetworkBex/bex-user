<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Bangkok temple skyline at golden hour">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a1a3a"/>
      <stop offset="40%" stop-color="#a44a3e"/>
      <stop offset="75%" stop-color="#e89456"/>
      <stop offset="100%" stop-color="#f5cf85"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="68%" r="14%">
      <stop offset="0%"   stop-color="#fff1c4"/>
      <stop offset="60%"  stop-color="#f5cf85" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a1a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="800" cy="610" r="80" fill="url(#sun)"/>
  <!-- Temple silhouette (mid-foreground) -->
  <g fill="#2a0e22" opacity="0.85">
    <rect x="600" y="540" width="400" height="200"/>
    <path d="M 600 540 L 800 380 L 1000 540 Z"/>
    <rect x="780" y="700" width="40" height="40"/>
    <path d="M 700 540 L 800 440 L 900 540 Z" fill="#5a1a30"/>
    <path d="M 620 540 L 700 480 L 780 540 Z" fill="#5a1a30"/>
    <path d="M 820 540 L 900 480 L 980 540 Z" fill="#5a1a30"/>
  </g>
  <!-- City blocks -->
  <g fill="#2a0e22" opacity="0.7">
    <rect x="40"   y="640" width="60"  height="100"/>
    <rect x="120"  y="600" width="80"  height="140"/>
    <rect x="220"  y="620" width="100" height="120"/>
    <rect x="340"  y="580" width="80"  height="160"/>
    <rect x="440"  y="610" width="120" height="130"/>
    <rect x="1040" y="600" width="80"  height="140"/>
    <rect x="1140" y="580" width="100" height="160"/>
    <rect x="1260" y="620" width="80"  height="120"/>
    <rect x="1360" y="600" width="100" height="140"/>
    <rect x="1480" y="630" width="80"  height="110"/>
  </g>
  <!-- Lanterns / window lights -->
  <g fill="#ffd089" opacity="0.9">
    <rect x="140"  y="650" width="3" height="3"/><rect x="170" y="680" width="3" height="3"/>
    <rect x="240"  y="660" width="3" height="3"/><rect x="280" y="690" width="3" height="3"/>
    <rect x="360"  y="620" width="3" height="3"/><rect x="390" y="660" width="3" height="3"/>
    <rect x="460"  y="650" width="3" height="3"/><rect x="500" y="680" width="3" height="3"/>
    <rect x="1060" y="640" width="3" height="3"/><rect x="1090" y="670" width="3" height="3"/>
    <rect x="1170" y="620" width="3" height="3"/><rect x="1200" y="660" width="3" height="3"/>
    <rect x="1280" y="660" width="3" height="3"/><rect x="1310" y="690" width="3" height="3"/>
    <rect x="1380" y="640" width="3" height="3"/><rect x="1420" y="680" width="3" height="3"/>
    <rect x="1500" y="660" width="3" height="3"/>
  </g>
  <!-- Temple glow -->
  <g fill="#ffd089" opacity="0.7">
    <rect x="790" y="560" width="3" height="3"/><rect x="810" y="580" width="3" height="3"/>
    <rect x="780" y="720" width="3" height="3"/><rect x="820" y="720" width="3" height="3"/>
  </g>
</svg>
