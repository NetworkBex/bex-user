<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hong Kong harbor skyline at twilight">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0e1f3a"/>
      <stop offset="40%" stop-color="#28527a"/>
      <stop offset="75%" stop-color="#c9774a"/>
      <stop offset="100%" stop-color="#f0c987"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a3a5c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1428" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Distant mountains -->
  <path d="M 0 560 L 200 480 L 360 520 L 540 460 L 720 510 L 900 470 L 1080 520 L 1280 480 L 1460 510 L 1600 470 L 1600 600 L 0 600 Z" fill="#0e1a2a" opacity="0.7"/>
  <!-- City silhouette -->
  <g fill="#08111f" opacity="0.9">
    <rect x="40"   y="600" width="50"  height="180"/>
    <rect x="100"  y="560" width="40"  height="220"/>
    <rect x="160"  y="580" width="80"  height="200"/>
    <rect x="260"  y="500" width="50"  height="280"/>
    <rect x="330"  y="540" width="60"  height="240"/>
    <rect x="410"  y="460" width="40"  height="320"/>
    <rect x="470"  y="500" width="100" height="280"/>
    <rect x="590"  y="440" width="55"  height="340"/>
    <rect x="670"  y="400" width="40"  height="380"/>
    <rect x="730"  y="480" width="90"  height="300"/>
    <rect x="840"  y="420" width="50"  height="360"/>
    <rect x="910"  y="460" width="80"  height="320"/>
    <rect x="1010" y="400" width="60"  height="380"/>
    <rect x="1090" y="380" width="50"  height="400"/>
    <rect x="1160" y="440" width="100" height="340"/>
    <rect x="1280" y="400" width="60"  height="380"/>
    <rect x="1360" y="460" width="80"  height="320"/>
    <rect x="1460" y="420" width="50"  height="360"/>
    <rect x="1530" y="480" width="60"  height="300"/>
  </g>
  <!-- Glowing windows -->
  <g fill="#ffd27a" opacity="0.85">
    <rect x="50"   y="640" width="3" height="3"/><rect x="80" y="660" width="3" height="3"/>
    <rect x="120"  y="600" width="3" height="3"/><rect x="160" y="620" width="3" height="3"/>
    <rect x="280"  y="540" width="3" height="3"/><rect x="320" y="580" width="3" height="3"/>
    <rect x="430"  y="500" width="3" height="3"/><rect x="460" y="540" width="3" height="3"/>
    <rect x="610"  y="480" width="3" height="3"/><rect x="650" y="520" width="3" height="3"/>
    <rect x="690"  y="440" width="3" height="3"/><rect x="720" y="480" width="3" height="3"/>
    <rect x="760"  y="520" width="3" height="3"/><rect x="790" y="560" width="3" height="3"/>
    <rect x="860"  y="460" width="3" height="3"/><rect x="890" y="500" width="3" height="3"/>
    <rect x="940"  y="500" width="3" height="3"/><rect x="970" y="540" width="3" height="3"/>
    <rect x="1030" y="440" width="3" height="3"/><rect x="1060" y="480" width="3" height="3"/>
    <rect x="1110" y="420" width="3" height="3"/><rect x="1140" y="460" width="3" height="3"/>
    <rect x="1190" y="480" width="3" height="3"/><rect x="1230" y="520" width="3" height="3"/>
    <rect x="1300" y="440" width="3" height="3"/><rect x="1330" y="480" width="3" height="3"/>
    <rect x="1390" y="500" width="3" height="3"/><rect x="1420" y="540" width="3" height="3"/>
    <rect x="1480" y="460" width="3" height="3"/><rect x="1510" y="500" width="3" height="3"/>
  </g>
  <!-- Water -->
  <rect y="780" width="1600" height="120" fill="url(#water)"/>
  <!-- Reflections -->
  <g fill="#ffd27a" opacity="0.18">
    <rect x="430"  y="800" width="3" height="40"/>
    <rect x="690"  y="800" width="3" height="60"/>
    <rect x="1110" y="800" width="3" height="80"/>
    <rect x="1300" y="800" width="3" height="50"/>
  </g>
</svg>
