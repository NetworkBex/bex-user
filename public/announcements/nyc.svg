<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="New York City skyline at dusk">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1230"/>
      <stop offset="35%" stop-color="#3a2466"/>
      <stop offset="70%" stop-color="#8b3f7a"/>
      <stop offset="100%" stop-color="#f3a06b"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0814" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0814"/>
    </linearGradient>
    <radialGradient id="haze" cx="50%" cy="60%" r="65%">
      <stop offset="0%"   stop-color="#f3a06b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1230" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#haze)"/>
  <!-- Distant skyline silhouette -->
  <g fill="#0a0814" opacity="0.55">
    <rect x="60"   y="640" width="60"  height="200"/>
    <rect x="130"  y="600" width="40"  height="240"/>
    <rect x="190"  y="660" width="80"  height="180"/>
    <rect x="290"  y="580" width="50"  height="260"/>
    <rect x="360"  y="620" width="70"  height="220"/>
    <rect x="450"  y="560" width="40"  height="280"/>
    <rect x="510"  y="600" width="90"  height="240"/>
    <rect x="620"  y="540" width="55"  height="300"/>
    <rect x="700"  y="500" width="40"  height="340"/>
    <rect x="760"  y="560" width="100" height="280"/>
    <rect x="880"  y="520" width="50"  height="320"/>
    <rect x="950"  y="580" width="80"  height="260"/>
    <rect x="1050" y="540" width="60"  height="300"/>
    <rect x="1130" y="500" width="50"  height="340"/>
    <rect x="1200" y="560" width="90"  height="280"/>
    <rect x="1310" y="520" width="60"  height="320"/>
    <rect x="1390" y="580" width="80"  height="260"/>
    <rect x="1490" y="540" width="50"  height="300"/>
  </g>
  <!-- Window lights -->
  <g fill="#ffd089" opacity="0.7">
    <rect x="80"   y="700" width="3" height="3"/>
    <rect x="120"  y="680" width="3" height="3"/>
    <rect x="200"  y="720" width="3" height="3"/>
    <rect x="310"  y="660" width="3" height="3"/>
    <rect x="380"  y="700" width="3" height="3"/>
    <rect x="470"  y="620" width="3" height="3"/>
    <rect x="540"  y="660" width="3" height="3"/>
    <rect x="640"  y="600" width="3" height="3"/>
    <rect x="720"  y="540" width="3" height="3"/>
    <rect x="800"  y="620" width="3" height="3"/>
    <rect x="900"  y="580" width="3" height="3"/>
    <rect x="980"  y="640" width="3" height="3"/>
    <rect x="1070" y="600" width="3" height="3"/>
    <rect x="1150" y="540" width="3" height="3"/>
    <rect x="1230" y="620" width="3" height="3"/>
    <rect x="1330" y="580" width="3" height="3"/>
    <rect x="1410" y="640" width="3" height="3"/>
    <rect x="1510" y="600" width="3" height="3"/>
    <rect x="100"  y="740" width="3" height="3"/>
    <rect x="240"  y="760" width="3" height="3"/>
    <rect x="400"  y="780" width="3" height="3"/>
    <rect x="560"  y="760" width="3" height="3"/>
    <rect x="700"  y="780" width="3" height="3"/>
    <rect x="860"  y="760" width="3" height="3"/>
    <rect x="1020" y="780" width="3" height="3"/>
    <rect x="1180" y="760" width="3" height="3"/>
    <rect x="1340" y="780" width="3" height="3"/>
    <rect x="1480" y="760" width="3" height="3"/>
  </g>
  <rect y="600" width="1600" height="300" fill="url(#floor)"/>
</svg>
